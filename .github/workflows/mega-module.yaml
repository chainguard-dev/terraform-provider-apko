name: Test Chainguard Images
on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

concurrency:
  group: presubmit-build-${{ github.head_ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Walk the images/ tree finding each image with a locked_config.json. That 
  # file is required for our build.
  discover:
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      images: ${{ steps.list.outputs.images }}
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: block
        allowed-endpoints: >
          api.github.com:443
          github.com:443
          objects.githubusercontent.com:443
          release-assets.githubusercontent.com:443

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: chainguard-images/images
        path: images
        persist-credentials: false

    - id: list
      shell: bash
      working-directory: images
      run: |
        set -euo pipefail
        # Emit a JSON array of image names that have a locked_config.json.
        images=$(for d in images/*/; do
          [ -f "${d}locked_config.json" ] && basename "${d%/}"
        done | jq -R . | jq -cs .)
        echo "images=${images}" >> "$GITHUB_OUTPUT"
        echo "Discovered images:"
        echo "${images}" | jq -r '.[]'

  build:
    needs: discover
    runs-on: ubuntu-latest

    strategy:
      # Surface every image's result independently; one broken image should
      # not mask failures in the rest.
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}

    permissions:
      # WARNING: This is mattmoor being a bit *too* clever.
      # We want to be able to test the reproducibility of things via the upstream
      # check-reproducibility test, which requires ambient credentials, but those
      # are only available to pull requests under two circumstances:
      #  1. The trigger is `pull_request_target`, and
      #  2. The pull request is from a branch on the main repo.
      # However, this doesn't cause things to fail when the pull request is from a
      # fork, it will just make the tf-cosign rules NOPs and the
      # check-repoducibility skip.
      #
      # But why not just use pull_request_target?
      # This is because to pull in breaking changes to apko, we will need to update
      # our apko Go dependency and the APKO_IMAGE (below) in the same PR, and the
      # latter cannot be checked with the former if the workflow is
      # pull_request_target.
      #
      # All of that said, dependabot and digestabot PRs come from branches on the
      # main repo, so the net effect of this SHOULD be that we get an error
      # presubmit when digestabot wants to pull in an update that is not
      # reproducible with the version of the apko Go library we depend on.
      id-token: write

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: block
        allowed-endpoints: >
          *.blob.core.windows.net:443
          *.githubapp.com:443
          9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
          api.github.com:443
          apk.cgr.dev:443
          cgr.dev:443
          checkpoint-api.hashicorp.com:443
          dl.google.com:443
          files.pythonhosted.org:443
          fulcio.sigstore.dev:443
          ghcr.io:443
          github.com:443
          go.dev:443
          objects.githubusercontent.com:443
          packages.cgr.dev:443
          packages.wolfi.dev:443
          pkg-containers.githubusercontent.com:443
          proxy.golang.org:443
          pypi.org:443
          raw.githubusercontent.com:443
          registry.terraform.io:443
          rekor.sigstore.dev:443
          release-assets.githubusercontent.com:443
          releases.hashicorp.com:443
          spdx.org:443
          storage.googleapis.com:443
          sum.golang.org:443
          tuf-repo-cdn.sigstore.dev:443

    # In some cases, we run out of disk space during tests, so this hack frees up
    # ~30G. The dotnet+AGENT_TOOLSDIRECTORY pair alone (~10G) is not enough headroom
    # for CUDA-heavy images like pytorch, whose layer tarballs were tipping the
    # runner over with "no space left on device".
    # See the following issue for more info: https://github.com/actions/runner-images/issues/2840#issuecomment-1284059930
    - name: Free up runner disk space
      shell: bash
      run: |
        set -x
        df -h /
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"
        df -h /

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        path: tf-apko
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: 'tf-apko/.go-version'

    - working-directory: tf-apko
      run: go build .

    # Make cosign/crane CLI available to the tests
    - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      with:
        # https://github.com/goreleaser/goreleaser/issues/6195
        cosign-release: "v2.6.2"

    - uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: chainguard-images/images
        path: images
        persist-credentials: false

    - uses: chainguard-dev/actions/setup-terraform@e1c4977ad9cb32b12c5b222ec0134a22bec60bd5 # v1.6.25
      with:
        terraform-version-file: 'tf-apko/.terraform-version'
        terraform-wrapper: false

    - uses: chainguard-dev/actions/setup-registry@e1c4977ad9cb32b12c5b222ec0134a22bec60bd5 # v1.6.25
      with:
        port: 5005
        disk: true

    - name: Build images using current providers, and current reproducibility tests
      working-directory: images
      env:
        TF_VAR_target_repository: localhost:5005/tf-apko
        IMAGE_NAME: ${{ matrix.image }}
      run: |
        terraform init

        # First do a stock build, to populate imagetest repo with current apko provider
        terraform apply -auto-approve -parallelism=4 \
          -var "image_name=${IMAGE_NAME}"

    - name: Build images using the new provider, and potentially new reproducibility tests
      working-directory: images
      env:
        TF_VAR_target_repository: localhost:5005/tf-apko
        APKO_IMAGE: ghcr.io/wolfi-dev/apko:latest@sha256:310e8ece9596c4ec6db7b4940eb5c977f977a88297e909380cc8495fc8ccb027
        IMAGE_NAME: ${{ matrix.image }}
      run: |
        # Now change to our custom apko provider, note it may have a
        # digest drift w.r.t. imagetest sandbox digests, but the above
        # prebuild should address it
        cat > ~/.terraformrc <<EOF
        provider_installation {
          dev_overrides {
            "chainguard-dev/apko" = "${GITHUB_WORKSPACE}/tf-apko"
          }
        }
        EOF

        # This should not fail, and there is a proof just above that
        # we have just successfully built things
        terraform apply -auto-approve -parallelism=4 \
          -var "image_name=${IMAGE_NAME}"

    - name: Upload imagetest logs
      if: always()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: "mega-module-imagetest-logs-${{ matrix.image }}"
        path: imagetest-logs

  build-the-world:
    needs: [build]
    runs-on: ubuntu-latest
    if: always()

    permissions:
      contents: read
      actions: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block

      - name: Verify build result
        env:
          RESULT: ${{ needs.build.result }}
        run: |
          echo "build result: ${RESULT}"
          if [[ "${RESULT}" != "success" && "${RESULT}" != "skipped" ]]; then
            exit 1
          fi
